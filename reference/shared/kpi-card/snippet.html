<section class="kpis">
  <!-- One .kpi block per metric. The dashboard renders 4 across. -->
  <div class="kpi">
    <div class="kpi__icon" style="background: var(--coffee-50); color: var(--coffee-600);">
      <!-- inline icon SVG -->
    </div>
    <div class="kpi__label">Quotes pending</div>
    <div class="kpi__val">4</div>
    <div class="kpi__delta kpi__delta--neutral">
      <strong>2 viewed</strong>
      <span class="kpi__delta-sub">$12.8k in flight</span>
    </div>
  </div>

  <!-- Variants: kpi__delta--up (green), kpi__delta--neutral (coffee), kpi__delta--warn (pink) -->
</section>
