<!-- Source: pages/assistant/raw.html lines 4030–4234 (PhoneAssistant component) -->
<!-- Reuses shared/phone-preview/snippet.html chassis. The contents differ:
     - phone__top renders a back button + client header + more button (instead of avatar+greeting+bell).
     - A "deal phase strip" sits below phone__top (Quote ✓ → Terms (active 4/10) → Send).
     - phone__scroll holds chat messages, phase dividers, condensed wizards. -->

<div class="phone">
  <div class="phone__screen">
    <div class="phone__notch"></div>
    <div class="phone__status">
      <span>9:41</span>
      <span class="phone__status-icons"><!-- signal/wifi/battery --></span>
    </div>

    <!-- Re-skinned top: back · client header · more -->
    <div class="phone__top" style="gap:10px;">
      <button class="phone__bell" style="background:#fff;border:1px solid var(--border);" aria-label="Back">
        <!-- back SVG -->
      </button>
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
        <!-- 32px green logo tile -->
        <div style="width:32px;height:32px;border-radius:10px;background:var(--brand-green);"></div>
        <div style="min-width:0;">
          <div style="font-family:var(--font-heading);font-weight:800;font-size:13px;">Tom &amp; Linda K.</div>
          <div style="font-size:10.5px;color:var(--green-600);font-weight:700;display:flex;align-items:center;gap:4px;">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--brand-green);"></span>
            $3,400 · finishing terms
          </div>
        </div>
      </div>
      <button class="phone__bell" aria-label="More"><!-- more SVG --></button>
    </div>

    <!-- Deal phase strip: Quote ✓ → Terms (active) → Send -->
    <div style="padding:8px 12px;background:var(--coffee-50);border-bottom:1px solid var(--border);
                display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;">
      <span style="display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:999px;
                    background:rgba(72,158,95,0.15);color:var(--brand-green);">
        <span style="width:11px;height:11px;border-radius:50%;background:var(--brand-green);color:#fff;
                     display:grid;place-items:center;font-size:7px;">✓</span>
        Quote
      </span>
      <span style="color:var(--fg-subtle);">›</span>
      <span style="display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:999px;
                    background:var(--brand-teal);color:#fff;">
        <span style="width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,0.2);
                     display:grid;place-items:center;font-size:7px;">2</span>
        Terms
      </span>
      <span style="color:var(--fg-subtle);">›</span>
      <span style="padding:3px 7px;border-radius:999px;background:#fff;color:var(--fg-muted);
                    border:1px solid var(--border);">Send</span>
      <span style="flex:1;"></span>
      <span style="font-size:9.5px;color:var(--fg-subtle);">4/10</span>
    </div>

    <!-- Scroll body: messages + phase dividers + a compact .wiz embed -->
    <div class="phone__scroll" style="padding:12px 12px 130px;gap:9px;">
      <div style="align-self:center;font-size:9.5px;font-weight:700;color:var(--fg-subtle);
                  background:var(--coffee-50);padding:3px 10px;border-radius:999px;
                  letter-spacing:0.05em;text-transform:uppercase;">
        Phase 1 — done
      </div>

      <!-- User voice memo bubble -->
      <div class="msg msg--user" style="max-width:92%;">
        <div class="msg__avatar">DR</div>
        <div><!-- Voice player component with played% --></div>
      </div>

      <!-- Assistant action card -->
      <div class="msg" style="max-width:96%;">
        <div class="msg__avatar"><!-- logo --></div>
        <div style="flex:1;min-width:0;">
          <div class="action-card" style="padding:10px;">
            <!-- compact action-card header showing Q-2026-041 · $3,400 + Locked chip -->
          </div>
        </div>
      </div>

      <!-- Phase 2 divider -->
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:9px;font-weight:800;letter-spacing:0.1em;color:var(--brand-teal);
                     text-transform:uppercase;">Phase 2 — Terms</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <!-- Wizard message — see ../payment-setup-wizard/snippet.html. The mobile variant uses
           a compact header and sets borderRadius:13 inline. -->
      <div class="msg">
        <div class="msg__avatar"><!-- logo --></div>
        <div class="wiz" style="border-radius:13px;">…compact wiz…</div>
      </div>
    </div>
  </div>
</div>
