<!--
  Behavior:
  - The currently visible word has class .word.in (opacity 1, translateY 0).
  - On rotate, JS adds .word.out to the current word (slide up + blur), then swaps .in to the next.
  - Cycle interval is set in inline JS (~3.4s).
  - data-en / data-es are picked up by the LangToggle script that swaps copy on click.
