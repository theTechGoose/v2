<!-- Reuses .qtrack__* — see pages/quotes/components/invoice-track / pages/invoices/components/invoice-track. -->
<section class="qtrack">
  <header class="qtrack__head">
    <span class="qtrack__chev"><!-- chevron --></span>
    <span class="qtrack__num">02</span>
    <span class="qtrack__title">Just landed</span>
    <span class="qtrack__count">3 payments</span>
  </header>
  <div class="qtrack__body">
    <div class="qtrack__body-inner">
      <div class="qcards">
        <!-- recent landed PaymentCards -->
      </div>
      <!-- Older landed renders as compact LandedRow chips below the cards -->
      <div class="qdone" style="margin-top:14px;">
        <!-- LandedRow markup (.qdone__row) -->
      </div>
    </div>
  </div>
</section>
